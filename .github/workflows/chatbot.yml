name: Profile Chatbot

on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  reply:
    # Run if it's not an issue event, or if it is an issue event starting with 'chat:'
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, 'chat:')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Chatbot Script
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_SENDER: ${{ github.event.issue.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python chatbot.py
